[/Script/MacTargetPlatform.MacTargetSettings]
bUseMetal=1
MetalShaderVersion=4
bEnableAppleSilicon=1
bEnableUniversalBinary=1
bUseModernXcode=1
bEnableGameMode=1
bAllowHighMemoryUsage=1
MaxMemoryAllocation=0.8
bUseCppCoroutinesForAsync=1
bEnableThreadedRendering=1
bEnableThreadedAudio=1
bUseMaxShaderModel=1

; Apple Silicon CPU affinity - all threads on performance cores
[SystemSettings]
TaskGraph.NumWorkerThreadsToIgnore=0
TaskGraph.EnablePowerSaving=0
TaskGraph.NumPerformanceCores=0

; ============================================================
; M1 CHIP SPECIFIC SETTINGS
; Applied when Apple Silicon M1 is detected at runtime
; ============================================================
[M1Settings]
; Lumen: software ray tracing, reduced sampling for M1
r.Lumen.Reflections.HardwareRayTracing=0
r.Lumen.Reflections.HardwareRayTracing.Translucent=0
r.Lumen.ScreenProbeGather.NumAdaptiveProbes=16
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=150
r.Lumen.ScreenProbeGather.MaxRayIntensity=20
r.Lumen.MaxBounces=3
; Nanite: moderate precision threshold for M1
r.Nanite.MaxPixelsPerEdge=2
r.Nanite.MaxNodes=1024
r.Nanite.MaxVisibleClusters=262144
r.Nanite.StreamingPool=1024
; VSM: reduced for M1
r.Shadow.Virtual.Enable=0
r.Shadow.Virtual.MaxPhysicalPages=4096
r.Shadow.Virtual.SMRT.RayCountDirectional=8
; TSR: quality mode for M1
r.TSR.History.ScreenPercentage=150
r.TSR.History.SampleCount=8
; Particle limits for M1
fx.Niagara.MaxGPUParticles=500000
fx.Niagara.MaxCPUParticles=50000
fx.Niagara.QualityLevel=3
; Post-processing: slightly reduced
r.BloomQuality=4
r.RefractionQuality=2
r.SSR.Quality=3
; Volumetric: reduced grid
r.VolumetricFog.GridPixelSize=8
r.VolumetricFog.GridSizeZ=96
; Physics: reduced particle count for M1
p.chaos.Water.SPH.ParticleCount=65536
p.chaos.Character.MaxActiveRagdolls=50
; Mass AI: unchanged (CPU-bound, M1 handles well)
; Streaming: reduced pool
r.Streaming.PoolSize=2048

; ============================================================
; M2/M3 CHIP SPECIFIC SETTINGS
; Applied when Apple Silicon M2 or M3 is detected at runtime
; ============================================================
[M2M3Settings]
; Lumen: full cinematic mode, max sampling for M2/M3
r.Lumen.Reflections.HardwareRayTracing=0
r.Lumen.Reflections.HardwareRayTracing.Translucent=0
r.Lumen.ScreenProbeGather.NumAdaptiveProbes=32
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=300
r.Lumen.ScreenProbeGather.MaxRayIntensity=40
r.Lumen.MaxBounces=4
; Nanite: highest precision mode for M2/M3
r.Nanite.MaxPixelsPerEdge=1
r.Nanite.MaxNodes=2048
r.Nanite.MaxVisibleClusters=524288
r.Nanite.StreamingPool=2048
; VSM: full quality for M2/M3
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.MaxPhysicalPages=8192
r.Shadow.Virtual.SMRT.RayCountDirectional=16
; TSR: max quality for M2/M3
r.TSR.History.ScreenPercentage=200
r.TSR.History.SampleCount=16
; Particle limits: unlimited for M2/M3
fx.Niagara.MaxGPUParticles=5000000
fx.Niagara.MaxCPUParticles=500000
fx.Niagara.QualityLevel=4
; Post-processing: all max
r.BloomQuality=5
r.RefractionQuality=3
r.SSR.Quality=4
; Volumetric: full resolution
r.VolumetricFog.GridPixelSize=4
r.VolumetricFog.GridSizeZ=128
; Physics: full particle count
p.chaos.Water.SPH.ParticleCount=262144
p.chaos.Character.MaxActiveRagdolls=200
; Streaming: full pool
r.Streaming.PoolSize=4096

; ============================================================
; SSD IO Priority - critical for open world streaming
; ============================================================
[IOStoreSettings]
; Prioritize SSD I/O for world streaming
IOStore.Priority=High
IOStore.MaxAsyncRequests=128
IOStore.ReadAheadSize=65536
IOStore.PrefetchDistance=3
IOStore.CompressionMethod=Oodle
IOStore.CompressionLevel=4
; Async loading priority for world partition
s.AsyncLoadingThreadEnabled=1
s.AsyncLoadingTimeLimit=10.0
s.PriorityAsyncLoadingExtraTime=15.0
s.LevelStreamingActorsUpdateTimeLimit=5.0
s.AsyncLoadingUseFullTimeLimit=1
s.PriorityLevelStreaming=1
s.ContinuousPriorityLevelStreaming=1